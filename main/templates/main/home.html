<!DOCTYPE html>
<html>
<head><title>Homepage</title></head>
<body>
    <h1>Properties for Sale</h1>
    <ul>
        {% for p in for_sale %}
        <li><a href="{% url 'property_detail' p.id %}">{{ p.name }}</a> – RM{{ p.cost }}</li>
        {% empty %}<li>No properties for sale.</li>{% endfor %}
    </ul>

    <h1>Properties for Rent</h1>
    <ul>
        {% for p in for_rent %}
        <li><a href="{% url 'property_detail' p.id %}">{{ p.name }}</a> – RM{{ p.cost }}</li>
        {% empty %}<li>No properties for rent.</li>{% endfor %}
    </ul>
</body>
</html>
