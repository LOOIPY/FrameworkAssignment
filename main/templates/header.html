{% load static %}
<script>
  function toggleDropdown(event) {
    event.stopPropagation();
    const dropdown = document.getElementById("accountDropdown");
    dropdown.classList.toggle("show");
  }

  window.addEventListener("click", function () {
    const dropdown = document.getElementById("accountDropdown");
    if (dropdown && dropdown.classList.contains("show")) {
      dropdown.classList.remove("show");
    }
  });
</script>
<link rel="stylesheet" href="{% static 'css/saved_property.css' %}">
<div class="frame-229">
  <div class="rectangle-645"></div>

  <a href="{% url 'booking_list' %}" style="text-decoration:none">
    <div class="bookinglist">
      <img src="{% static 'images/vector1.svg' %}" alt="Booking Icon" />
      BookingList
    </div>
  </a>

  <div class="account">
    <img src="{% static 'images/vector2.svg' %}" alt="Account Icon" />
    {% if user.is_authenticated %}
      <div class="dropdown">
        <button class="dropbtn" onclick="toggleDropdown(event)">{{ user.username }}</button>
        <div class="dropdown-content" id="accountDropdown">
          <a href="{% url 'my_properties' %}">My Properties</a>
          <a href="{% url 'checklist' %}" class="action-btn"><i class="fas fa-clipboard-list"></i> Add Checklist</a>
          <a href="{% url 'invoice' %}" class="action-btn"><i class="fas fa-file-invoice-dollar"></i> Create Invoice</a>
          <a href="{% url 'profile' %}">Profile</a>
          <a href="{% url 'logout' %}">Logout</a>
        </div>
      </div>
    {% else %}
      <a href="{% url 'login' %}" style="margin-top:3px; display:inline-block;padding:6px 10px 15px 10px;">Account</a>
    {% endif %}
  </div>

  <a href="{% url 'saved_properties' %}" style="text-decoration:none">
    <div class="wishlist">
      <img src="{% static 'images/vector3.svg' %}" alt="Wishlist Icon" />
      Wishlist
    </div>
  </a>

  <div class="rectangle-7"></div>

  <div class="buy-rent-new-launches-transations-advertise-guies-insights-events">
    <span>
      <a href="{% url 'proplistpage:property-list' %}" style="text-decoration:none; color:#000000;">Buy</a>
      |
      <a href="{% url 'rentlistpage:rent-list' %}" style="text-decoration:none; color: #111111;">Rent</a>
      |
      <a href="{% url 'proplistpage:new-launches' %}" style="text-decoration:none; color: #111111;">New Launches</a>
      |
      Transations |
      Advertise |
      Guides&amp;insights
    </span>
  </div>
</div>
