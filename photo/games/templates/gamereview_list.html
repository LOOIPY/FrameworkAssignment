<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>游戏评测列表</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        line-height: 1.6;
        margin: 0;
        padding: 20px;
        background-color: #f4f4f4;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
      }
      h1 {
        color: #333;
        text-align: center;
        margin-bottom: 30px;
      }
      .review-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
      }
      .review-card {
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        padding: 20px;
      }
      .game-title {
        font-size: 1.2rem;
        font-weight: bold;
        margin-bottom: 10px;
      }
      .rating {
        color: #f8ce0b;
        font-size: 1.5rem;
        margin-bottom: 10px;
      }
      .reviewer {
        font-weight: bold;
        margin-bottom: 5px;
      }
      .comment {
        margin-bottom: 15px;
      }
      .date {
        color: #777;
        font-size: 0.9rem;
        text-align: right;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>游戏评测列表</h1>

      <div class="review-grid">
        {% for review in reviews %}
        <div class="review-card">
          <div class="game-title">{{ review.game.name }}</div>
          <div class="rating">
            {% for i in "12345" %} {% if forloop.counter <= review.rating %} ★
            {% else %} ☆ {% endif %} {% endfor %}
          </div>
          <p class="reviewer">评测人: {{ review.reviewer_name }}</p>
          <p class="comment">{{ review.comment }}</p>
          <p class="date">{{ review.date_posted|date:"Y-m-d H:i" }}</p>
        </div>
        {% empty %}
        <p>暂无评测数据</p>
        {% endfor %}
      </div>
    </div>
  </body>
</html>
