<!-- edit_my_property.html -->
{% block content %}
<div class="container">
    <h2>Edit Property</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-submit">Save Changes</button>
    </form>
</div>

<style>
.btn-submit {
    background-color: #3f3d9c;
    color: white;
    padding: 10px 20px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    margin-top: 20px;
}
</style>

{% endblock %}
