<!-- my_properties.html -->
{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container">
    <h2 class="page-title">My Properties</h2>
    <a href="{% url 'add_my_property' %}" class="btn-add">+ Add New Property</a>

    <div class="property-grid">
        {% for prop in properties %}
        <div class="property-card">
            <img src="{{ prop.image.url }}" alt="Property Image" class="property-img">
            <h3>{{ prop.title }}</h3>
            <p>{{ prop.location }}</p>
            <p>RM {{ prop.price }}</p>
            <div class="property-actions">
                <form action="{% url 'delete_my_property' prop.id %}" method="post" style="display:inline">
                    {% csrf_token %}
                    <button type="submit" class="btn-delete">Delete</button>
                </form>
                <a href="{% url 'edit_my_property' prop.id %}" class="btn-edit">Edit</a>
            </div>
        </div>
        {% empty %}
        <p>No properties found.</p>
        {% endfor %}
    </div>
</div>

<style>
.container {
    padding: 40px;
    font-family: Arial, sans-serif;
}
.page-title {
    font-size: 28px;
    color: #3f3d9c;
    margin-bottom: 20px;
}
.btn-add {
    background-color: #f44336;
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    text-decoration: none;
    float: right;
}
.property-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    margin-top: 40px;
}
.property-card {
    border: 1px solid #ccc;
    padding: 20px;
    width: 280px;
    text-align: center;
    border-radius: 10px;
}
.property-img {
    width: 100px;
    height: 100px;
    object-fit: cover;
    margin-bottom: 10px;
}
.property-actions {
    margin-top: 10px;
}
.btn-delete, .btn-edit {
    padding: 8px 15px;
    border-radius: 20px;
    border: none;
    margin: 5px;
    cursor: pointer;
    text-decoration: none;
    color: white;
}
.btn-delete {
    background-color: white;
    color: #f44336;
    border: 1px solid #f44336;
}
.btn-edit {
    background-color: #f44336;
}
</style>
{% endblock %}
