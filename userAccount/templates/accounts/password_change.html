<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Change Password</title>
    <style>
        body { font-family: Arial; padding: 40px; background: #fff; }
        form { max-width: 400px; margin: auto; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; }
        button { margin-top: 20px; padding: 10px 20px; background: #3f3d9c; color: white; border: none; border-radius: 8px; cursor: pointer; }
        button:hover { background: #2c2a85; }
    </style>
</head>
<body>
    <h2 style="text-align:center">Change Your Password</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Change Password</button>
    </form>
</body>
</html>
