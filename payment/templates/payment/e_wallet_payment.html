{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{{ wallet_name }} Payment</title>
    <link rel="stylesheet" type="text/css" href="{% static 'main/style.css' %}">
    <style>
        .container {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background: #f7f9fc;
            border-radius: 12px;
            text-align: center;
        }
        .qr {
            margin: 20px 0;
        }
        .button-pay {
            background-color: #1a8c83;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>{{ wallet_name }}</h2>
    <p>Amount to pay: <strong>RM {{ amount|floatformat:2 }}</strong></p>

    <div class="qr">
        <img src="data:image/png;base64,{{ qr_code_base64 }}" alt="QR Code" width="250">
    </div>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="button-pay">I've approved/rejected my transaction via TapSecure</button>
    </form>
</div>

</body>
</html>
