{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Credit Card Payment</title>
    <link rel="stylesheet" type="text/css" href="{% static 'main/style.css' %}">
    <style>
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        .button-pay {
            background-color: #1a8c83;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }

        .button-pay:hover {
            background-color: #13786f;
        }

        .container {
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            background: #f7f9fc;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .messages {
            color: red;
            margin-bottom: 10px;
        }

        .messages.success {
            color: green;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Enter Credit Card Details</h2>

    {% if messages %}
        {% for message in messages %}
            <p class="messages {% if message.tags %}{{ message.tags }}{% endif %}">{{ message }}</p>
        {% endfor %}
    {% endif %}


    <p>Amount to pay: <strong>RM {{ amount|floatformat:2 }}</strong></p>
    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="card_number">Card Number:</label>
            <input type="text" id="card_number" name="card_number" maxlength="16" required>
        </div>

        <div class="form-group">
            <label for="expiry">Expiry Date (MM/YY):</label>
            <input type="text" id="expiry" name="expiry" placeholder="MM/YY" required>
        </div>

        <div class="form-group">
            <label for="cardholder">Cardholder's Name:</label>
            <input type="text" id="cardholder" name="name" required>
        </div>

        <div class="form-group">
            <label for="cvv">CVV:</label>
            <input type="text" id="cvv" name="cvv" maxlength="4" required>
        </div>

        <button type="submit" class="button-pay">Pay</button>
    </form>
</div>

</body>
</html>
